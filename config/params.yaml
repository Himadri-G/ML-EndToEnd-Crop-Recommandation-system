optuna:
  n_trials: 20

models:

  ridge:
    alpha:
      type: float
      low: 0.01
      high: 10

  lasso:
    alpha:
      type: float
      low: 0.001
      high: 1

  elasticnet:
    alpha:
      type: float
      low: 0.001
      high: 1
    l1_ratio:
      type: float
      low: 0.1
      high: 0.9

  decision_tree:
    max_depth:
      type: int
      low: 3
      high: 20

  gradient_boosting:
    n_estimators:
      type: int
      low: 100
      high: 400
    learning_rate:
      type: float
      low: 0.01
      high: 0.3

  svr:
    C:
      type: float
      low: 0.1
      high: 10

  knn:
    n_neighbors:
      type: int
      low: 3
      high: 15